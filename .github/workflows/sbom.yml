name: Submit SBOM to PG Atlas
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Fetch and submit SBOM
        uses: SCF-Public-Goods-Maintenance/pg-atlas-sbom-action@d1b4ed0d30aff566ca0e8356af85521d007a567e # v1.0.0
